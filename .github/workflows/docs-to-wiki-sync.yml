name: Sync Docs to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-to-wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync
  cancel-in-progress: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docs source
        run: |
          if [ ! -d "docs" ]; then
            echo "Missing docs/ folder in repository root"
            exit 1
          fi

      - name: Validate GitHub Wiki is enabled
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HAS_WIKI=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.has_wiki')

          if [ "${HAS_WIKI}" != "true" ]; then
            echo "GitHub Wiki is disabled for ${{ github.repository }}"
            echo "Enable it in Settings > Features > Wikis, then re-run this workflow."
            exit 1
          fi

      - name: Clone wiki repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-repo || {
            echo "Unable to clone wiki repository for ${{ github.repository }}."
            echo "If this is the first wiki sync, create a first wiki page from GitHub UI and re-run."
            exit 1
          }

      - name: Sync files to wiki repository
        run: |
          rsync -av --delete --exclude='.git/' docs/ wiki-repo/
          if [ -f wiki-repo/README.md ]; then
            cp wiki-repo/README.md wiki-repo/Home.md
          fi

      - name: Commit and push changes
        working-directory: wiki-repo
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No docs changes to publish to wiki"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "docs: sync wiki from docs (${GITHUB_SHA::7})"
          git push
